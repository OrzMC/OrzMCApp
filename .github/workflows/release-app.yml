name: Release App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  app:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4.1
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          sw_vers
          xcodebuild -version

      - uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/cache@v4
        with:
          path: DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-derived-${{ hashFiles('**/*.swift', '**/*.xcodeproj/**') }}

      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-${{ runner.arch }}-spm-${{ hashFiles('**/Package.resolved') }}

      - uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-${{ runner.arch }}-modulecache-${{ hashFiles('**/*.swift', '**/*.xcodeproj/**') }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-swiftpmcache-${{ hashFiles('**/Package.resolved') }}

      - name: Resolve package dependencies
        run: |
          xcrun xcodebuild -resolvePackageDependencies \
            -scheme OrzMC \
            -derivedDataPath DerivedData

      - name: Build, notarize, and publish release
        env:
          APPLE_TEAM_ID: ${{ secrets.TEAM_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTARY_TIMEOUT_DURATION: ${{ vars.NOTARY_TIMEOUT_DURATION }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          DERIVED_DATA_PATH: DerivedData
          RESIGN_EXPORTED_APP: "1"
          PUBLISH_GITHUB: "1"
        run: |
          ./scripts/release-macos.sh

      - name: Commit appcast.xml
        run: |
          git add products/appcast.xml
          git commit -m "Update appcast.xml for macOS release" || echo "No appcast changes"
          git push

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifacts
          path: |
            dist/macos/**/*.zip
            dist/macos/**/*.dmg
            products/appcast.xml
